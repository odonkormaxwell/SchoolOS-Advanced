kind = "web"
previewPath = "/"
title = "Maxibern SchoolOS"
version = "1.0.0"
id = "artifacts/school-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23889

[services.development]
run = "pnpm --filter @workspace/school-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-dashboard", "run", "build" ]
publicDir = "artifacts/school-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23889"
BASE_PATH = "/"
